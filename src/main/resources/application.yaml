spring:
  application:
    name: plasma

plasma:
  ai:
    base-url: http://jh-devnet.iptime.org:17181
    timeout-seconds: 130

---
spring:
  profiles:
    active: local
    group:
      local: local, common, h2
      blue: blue, common, rds, secret
      green: green, common, rds, secret
      mysql-local: mysql-local, common, rds, secret

server:
  env: blue

---
spring:
  config:
    activate:
      on-profile: local

server:
  port: 8080
  serverAddress: localhost

serverName: local_server

---
spring:
  config:
    activate:
      on-profile: mysql-local

server:
  port: 8080
  serverAddress: localhost

serverName: mysql_local_server

---
spring:
  config:
    activate:
      on-profile: blue

server:
  port: 8080
  serverAddress: 13.209.213.24

serverName: blue_server

---
spring:
  config:
    activate:
      on-profile: green

server:
  port: 8081
  serverAddress: 13.209.213.24

serverName: green_server

---
spring:
  config:
    activate:
      on-profile: common

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

---
spring:
  config:
    activate:
      on-profile: h2

  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:plasma
    username: sa
    password: 1234

  h2:
    console:
      enabled: true
      path: /h2-console

---
spring:
  config:
    activate:
      on-profile: rds

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver